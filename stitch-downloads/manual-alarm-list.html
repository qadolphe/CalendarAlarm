<body class="antialiased min-h-screen flex flex-col pb-[80px] md:pb-0">

</div>
<button class="flex items-center justify-center hover:opacity-80 active:scale-95 transition-all duration-150">
<span class="material-symbols-outlined text-orange-500 text-2xl" data-icon="add">add</span>
</button>
</header>
<!-- Main Content Canvas -->

<div class="mb-stack-lg flex justify-between items-end">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Alarms</h2>
</div>
<!-- Alarms List -->
<div class="flex flex-col gap-base bg-[#1C1C1E] rounded-xl p-base border-[0.5px] border-[#2a2a2a]">
<!-- Alarm Item 1 (Active) -->
<div class="flex items-center justify-between p-gutter border-b-[0.5px] border-[#2a2a2a] last:border-0 rounded-lg transition-colors border border-orange-500/30 bg-orange-500/5">
<div class="flex flex-col">
<div class="flex items-baseline gap-2">
<span class="font-display text-display text-on-surface">06:00</span>
<span class="font-body-lg text-body-lg text-on-surface-variant">AM</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-1">Mon, Tue, Wed, Thu, Fri</span>
</div>
<div class="flex items-center">
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-high peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-500"></div>
</label>
</div>
</div>
<!-- Alarm Item 2 (Inactive) -->

<div class="flex flex-col opacity-50">
<div class="flex items-baseline gap-2">
<span class="font-display text-display text-on-surface">07:30</span>
<span class="font-body-lg text-body-lg text-on-surface-variant">AM</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-1">Sat, Sun</span>
</div>
