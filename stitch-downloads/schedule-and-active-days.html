<style>
        body {
            background-color: #000000;
            color: #e2e2e2;
            -webkit-tap-highlight-color: transparent;
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 20px); }
        
        /* Glassmorphism utilities */
        .glass-surface {
            background-color: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
        }
        .glass-card {
            background-color: rgba(31, 31, 31, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 0.5px solid rgba(255, 255, 255, 0.05);
        }
        .glass-nav {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 0px; height: 0px; }
        
        /* Toggle Switch Native Styling */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #ff9f0a;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #ff9f0a;
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            border-color: white;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="antialiased min-h-screen flex flex-col font-body-lg overflow-x-hidden selection:bg-primary-container selection:text-black">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 pt-safe bg-black/80 backdrop-blur-xl border-zinc-800 border-b-[0.5px] md:hidden">
<div class="flex items-center">
<button class="w-8 h-8 rounded-full bg-surface-container overflow-hidden flex items-center justify-center hover:opacity-80 active:scale-95 transition-all duration-150">
<img alt="User profile" class="w-full h-full object-cover" data-alt="A close-up, high-quality portrait photograph of a user profile avatar. The lighting is soft and natural, emphasizing a professional yet approachable mood. The image fits the minimalist, high-contrast aesthetic of the application, seamlessly blending into the dark mode UI with a subtle, premium feel." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxljhIkCgUUzLcQhR5RTk6wK2_5Hmo2abnY_0VxeiGbr3IlCSKUNKEczAMJ7Yp26SdVtyHkogGWXG5G_MEg4_ka-02yrkeTAJ2CLIm4GX1F4EnGiYZuvDyeym231RWHRJy_SpzGLvTf09C51UEpvNnJm40vlFxbeXSTUGynbKEm49Zp5pj4r2OF4y02hEECE4EI_8KDJ2VXjZOpAyTERMyihvrHF06lQqYMmYBAWtDfbPFz3S940gIPkV9YeGmDYrmFgRj4WA7ZzsI"/>
</button>
</div>
<h1 class="text-orange-500 font-black text-xl font-inter tracking-tight">Rise</h1>
<button class="w-8 h-8 flex items-center justify-center text-zinc-500 hover:text-orange-500 active:scale-95 transition-all duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">add</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto pt-24 pb-32 px-margin-edge flex flex-col gap-stack-lg relative z-10 md:pt-16 md:max-w-2xl">
<!-- Header Section -->
<section class="flex flex-col gap-stack-sm">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Active Days</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant opacity-80">Configure when Auto-Pilot manages your routine.</p>
</section>
<!-- Auto-Pilot Master Toggle Card -->
<section class="glass-card rounded-xl p-4 flex items-center justify-between shadow-sm">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container/10 flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
</div>
<div class="flex flex-col">
<span class="font-headline-md text-[18px] font-semibold text-on-surface leading-tight">Auto-Pilot</span>
<span class="font-body-sm text-[13px] text-on-surface-variant">Currently Active</span>
</div>
</div>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 transition-transform duration-200 ease-in-out border-primary-container translate-x-6" id="autopilot-toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-primary-container cursor-pointer transition-colors duration-200 ease-in-out" for="autopilot-toggle"></label>
</div>
</section>
<!-- Day Picker Bento -->
<section class="flex flex-col gap-stack-md">
<div class="flex justify-between items-end px-1">
<h3 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Schedule Grid</h3>
<span class="font-body-sm text-[12px] text-primary-container">5 days active</span>
</div>
<div class="grid grid-cols-7 gap-2">
<!-- Monday (Active) -->
<button class="flex flex-col items-center justify-center h-16 rounded-lg bg-surface-container-high border-[0.5px] border-primary-container/50 relative overflow-hidden active:scale-95 transition-transform">
<div class="absolute inset-0 bg-primary-container/10"></div>
<span class="font-label-caps text-[11px] text-on-surface z-10 mb-1">MON</span>
<div class="w-1.5 h-1.5 rounded-full bg-primary-container z-10 shadow-[0_0_8px_rgba(255,159,10,0.8)]"></div>
</button>
<!-- Tuesday (Active) -->
<button class="flex flex-col items-center justify-center h-16 rounded-lg bg-surface-container-high border-[0.5px] border-primary-container/50 relative overflow-hidden active:scale-95 transition-transform">
<div class="absolute inset-0 bg-primary-container/10"></div>
<span class="font-label-caps text-[11px] text-on-surface z-10 mb-1">TUE</span>
<div class="w-1.5 h-1.5 rounded-full bg-primary-container z-10 shadow-[0_0_8px_rgba(255,159,10,0.8)]"></div>
</button>
<!-- Wednesday (Active) -->
<button class="flex flex-col items-center justify-center h-16 rounded-lg bg-surface-container-high border-[0.5px] border-primary-container/50 relative overflow-hidden active:scale-95 transition-transform">
<div class="absolute inset-0 bg-primary-container/10"></div>
<span class="font-label-caps text-[11px] text-on-surface z-10 mb-1">WED</span>
<div class="w-1.5 h-1.5 rounded-full bg-primary-container z-10 shadow-[0_0_8px_rgba(255,159,10,0.8)]"></div>
</button>
<!-- Thursday (Active) -->
<button class="flex flex-col items-center justify-center h-16 rounded-lg bg-surface-container-high border-[0.5px] border-primary-container/50 relative overflow-hidden active:scale-95 transition-transform">
<div class="absolute inset-0 bg-primary-container/10"></div>
<span class="font-label-caps text-[11px] text-on-surface z-10 mb-1">THU</span>
<div class="w-1.5 h-1.5 rounded-full bg-primary-container z-10 shadow-[0_0_8px_rgba(255,159,10,0.8)]"></div>
</button>
<!-- Friday (Active) -->
<button class="flex flex-col items-center justify-center h-16 rounded-lg bg-surface-container-high border-[0.5px] border-primary-container/50 relative overflow-hidden active:scale-95 transition-transform">
<div class="absolute inset-0 bg-primary-container/10"></div>
<span class="font-label-caps text-[11px] text-on-surface z-10 mb-1">FRI</span>
<div class="w-1.5 h-1.5 rounded-full bg-primary-container z-10 shadow-[0_0_8px_rgba(255,159,10,0.8)]"></div>
</button>
<!-- Saturday (Inactive) -->
<button class="flex flex-col items-center justify-center h-16 rounded-lg bg-surface-container border-[0.5px] border-white/5 relative overflow-hidden active:scale-95 transition-transform">
<span class="font-label-caps text-[11px] text-on-surface-variant z-10 mb-1 opacity-50">SAT</span>
<div class="w-1.5 h-1.5 rounded-full bg-surface-variant z-10"></div>
</button>
<!-- Sunday (Inactive) -->
<button class="flex flex-col items-center justify-center h-16 rounded-lg bg-surface-container border-[0.5px] border-white/5 relative overflow-hidden active:scale-95 transition-transform">
<span class="font-label-caps text-[11px] text-on-surface-variant z-10 mb-1 opacity-50">SUN</span>
<div class="w-1.5 h-1.5 rounded-full bg-surface-variant z-10"></div>
</button>
</div>
</section>
<!-- Summary & Context Card -->
<section class="glass-surface rounded-xl p-5 flex flex-col gap-4 relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/5 rounded-full blur-2xl -translate-y-1/2 translate-x-1/2"></div>
<div class="flex items-start gap-3 relative z-10">
<span class="material-symbols-outlined text-primary-container mt-0.5" style="font-variation-settings: 'FILL' 1;">info</span>
<div>
<h4 class="font-headline-md text-[16px] text-on-surface mb-1">Weekday Routine Active</h4>
<p class="font-body-sm text-[14px] text-on-surface-variant leading-relaxed">Auto-Pilot will gently wake you at <strong class="text-on-surface font-medium">6:30 AM</strong> and initiate your morning sequence from Monday to Friday.</p>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pt-2 pb-safe px-4 bg-black/80 backdrop-blur-xl border-t-[0.5px] border-zinc-800 md:hidden">
<button class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-300 active:scale-90 transition-transform duration-200 w-16 h-12">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">home_filled</span>
<span class="text-[10px] font-medium font-inter">Dashboard</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-300 active:scale-90 transition-transform duration-200 w-16 h-12">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">tune</span>
<span class="text-[10px] font-medium font-inter">Logic</span>
</button>
<button class="flex flex-col items-center justify-center text-orange-500 hover:text-zinc-300 active:scale-90 transition-transform duration-200 w-16 h-12">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
<span class="text-[10px] font-medium font-inter">Schedule</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-300 active:scale-90 transition-transform duration-200 w-16 h-12">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">alarm</span>
<span class="text-[10px] font-medium font-inter">Alarms</span>
</button>
</nav>
</body></html>
